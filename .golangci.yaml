# Defines the configuration version.
# The only possible value is "2".
version: "2"
linters:
  # See https://golangci-lint.run/usage/linters for details.
  default: none
  enable:
    - containedctx
    - contextcheck
    - fatcontext
    - godoclint
    - godot
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unparam
    - unused
    - usetesting
  settings:
    godoclint:
      default: all
      options:
        max-len:
          length: 120
  exclusions:
    rules:
      - path: _test\.go$
        linters:
          - godoclint
