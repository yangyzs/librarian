name: Java
on: [push, pull_request, merge_group]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-24.04
    # Presubmit jobs must complete within 5 minutes. See CONTRIBUTING.md.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-librarian
      - name: Checkout google-cloud-java
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: googleapis/google-cloud-java
          path: google-cloud-java
          persist-credentials: false
      - name: Display Go version
        run: go version
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Cache Librarian Tools & Venv
        id: cache-tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/librarian
            venv
          key: librarian-java-tools-v1-${{ runner.os }}-${{ hashFiles('google-cloud-java/librarian.yaml', 'google-cloud-java/sdk-platform-java/gapic-generator-java/**', 'google-cloud-java/sdk-platform-java/hermetic_build/library_generation/**') }}
      - name: Create Python virtual environment
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: python3 -m venv venv
      - name: Activate virtual environment
        run: echo "$GITHUB_WORKSPACE/venv/bin" >> $GITHUB_PATH
      - name: Verify Java and Maven installation
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          java -version
          if ! command -v mvn &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y maven
          fi
          mvn -version
      - name: Add Java tools to PATH
        run: echo "$HOME/.cache/librarian/bin/java_tools/bin" >> $GITHUB_PATH
      - name: Run librarian install
        if: steps.cache-tools.outputs.cache-hit != 'true'
        working-directory: google-cloud-java
        run: |
          librarian install
      - name: Verify tools
        run: |
          protoc --version
          google-java-format --version
          # Verify plugins are executable (they don't support --version)
          test -x "$(which protoc-gen-java_grpc)"
          test -x "$(which protoc-gen-java_gapic)"
      - name: Run internal/librarian/java tests and check coverage
        run: go run ./tool/cmd/coverage ./internal/librarian/java
  integration:
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-librarian
      - name: Checkout google-cloud-java
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: googleapis/google-cloud-java
          path: google-cloud-java
          persist-credentials: false
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"
          # Explicitly install Maven on this runner (it is a requirement for the workflow).
      - name: Verify Java and Maven installation
        run: |
          java -version
          if ! command -v mvn &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y maven
          fi
          mvn -version
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Run librarian install
        working-directory: google-cloud-java
        run: |
          librarian install
          echo "$HOME/.cache/librarian/bin/java_tools/bin" >> $GITHUB_PATH
      - name: Run librarian generate
        working-directory: google-cloud-java
        env:
          PYTHONPATH: ${{ github.workspace }}/google-cloud-java/sdk-platform-java/hermetic_build/library_generation/owlbot
        run: librarian generate --all
  create-issue-on-failure:
    needs: [integration]
    permissions:
      contents: read
      issues: write
    if: ${{ always() && contains(needs.*.result, 'failure') && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/create-issue-on-failure.yaml
    with:
      language: Java
      repository: google-cloud-java
